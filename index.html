<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的個人網站</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft JhengHei", sans-serif;
    }

    body {
      background: #f5f5f5;
      color: #333;
      line-height: 1.6;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 40px 20px;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .profile-img {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      object-fit: cover;
      border: 5px solid #eee;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    p {
      color: #666;
      margin-bottom: 25px;
    }

    .btn-group {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 12px 24px;
      background: #333;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #555;
      transform: translateY(-2px);
    }

    footer {
      text-align: center;
      margin-top: 40px;
      color: #999;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="container">
    
    <section class="hero">

      <!-- 個人照片 -->
      <img src="me.jpg" alt="我的照片" class="profile-img">

      <!-- 個人資訊 -->
      <h1>你的名字</h1>

      <p>
        嗨！我是你的名字，這是我的個人網站。<br>
        歡迎查看我的作品與聯絡資訊。
      </p>

      <!-- 按鈕 -->
      <div class="btn-group">

        <!-- 作品 PDF -->
        <a href="work.pdf" target="_blank" class="btn">
          查看我的作品
        </a>

        <!-- 信箱 -->
        <a href="mailto:yourmail@example.com" class="btn">
          聯絡我
        </a>

      </div>

    </section>

    <footer>
      © 2026 我的個人網站
    </footer>

  </div>

</body>
</html>
