<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>My Portfolio</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#dfe6ee;
      color:#111;
      font-family:'Inter',sans-serif;
      overflow-x:hidden;
    }

    /* navbar */

    nav{
      width:100%;
      padding:28px 50px;
      border-bottom:1px solid rgba(0,0,0,0.08);
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .logo{
      font-family:'Cormorant Garamond',serif;
      font-size:42px;
      font-style:italic;
      letter-spacing:2px;
    }

    .nav-links{
      display:flex;
      gap:30px;
    }

    .nav-links a{
      text-decoration:none;
      color:#111;
      font-size:14px;
      letter-spacing:1px;
      transition:0.3s;
    }

    .nav-links a:hover{
      opacity:0.5;
    }

    /* hero */

    .hero{
      padding:60px 6vw 0;
    }

    .hero-title{
      font-family:'Cormorant Garamond',serif;
      font-size:9vw;
      line-height:0.9;
      font-weight:300;
      letter-spacing:-3px;
      margin-bottom:40px;
    }

    .hero-title span{
      font-style:italic;
    }

    /* image */

    .hero-image{
      width:100%;
      height:75vh;
      overflow:hidden;
      border-radius:4px 4px 0 0;
    }

    .hero-image img{
      width:100%;
      height:100%;
      object-fit:cover;
      transition:1s;
    }

    .hero-image img:hover{
      transform:scale(1.03);
    }

    /* info section */

    .info{
      background:white;
      padding:70px 6vw;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:60px;
    }

    .info-left h2{
      font-family:'Cormorant Garamond',serif;
      font-size:64px;
      font-weight:300;
      margin-bottom:20px;
    }

    .info-left p{
      color:#555;
      line-height:1.8;
      max-width:500px;
    }

    .buttons{
      margin-top:35px;
      display:flex;
      gap:20px;
      flex-wrap:wrap;
    }

    .btn{
      padding:14px 28px;
      border:1px solid #111;
      text-decoration:none;
      color:#111;
      transition:0.4s;
      font-size:14px;
      letter-spacing:1px;
    }

    .btn:hover{
      background:#111;
      color:white;
    }

    .info-right{
      display:flex;
      justify-content:flex-end;
      align-items:flex-end;
    }

    .mini-text{
      font-size:14px;
      color:#666;
      max-width:250px;
      line-height:1.8;
    }

    footer{
      padding:35px;
      text-align:center;
      font-size:13px;
      color:#666;
      background:#f5f5f5;
    }

    /* responsive */

    @media(max-width:900px){

      .hero-title{
        font-size:18vw;
      }

      .info{
        grid-template-columns:1fr;
      }

      nav{
        padding:25px;
      }

      .hero{
        padding:40px 25px 0;
      }

      .info{
        padding:50px 25px;
      }

    }

  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav>

    <div class="logo">LQ</div>

    <div class="nav-links">
      <a href="#">ABOUT</a>
      <a href="work.pdf" target="_blank">WORK</a>
      <a href="mailto:yourmail@example.com">CONTACT</a>
    </div>

  </nav>

  <!-- HERO -->
  <section class="hero">

    <h1 class="hero-title">
      The Art of <span>Subtle</span><br>
      Transformation
    </h1>

    <!-- 個人照片 -->
    <div class="hero-image">
      <img src="me.jpg" alt="My Photo">
    </div>

  </section>

  <!-- INFO -->
  <section class="info">

    <div class="info-left">

      <h2>About Me</h2>

      <p>
        我是一位創作者，專注於美感、風格與個人表達。
        透過作品呈現細膩的情緒與獨特視角，
        持續探索影像、設計與個人品牌之間的可能性。
      </p>

      <div class="buttons">

        <!-- PDF 作品 -->
        <a href="work.pdf" target="_blank" class="btn">
          VIEW WORK
        </a>

        <!-- Email -->
        <a href="mailto:yourmail@example.com" class="btn">
          CONTACT
        </a>

      </div>

    </div>

    <div class="info-right">

      <div class="mini-text">
        Based on minimalist editorial aesthetics,
        blending fashion, photography and visual storytelling.
      </div>

    </div>

  </section>

  <footer>
    © 2026 YOUR NAME
  </footer>

</body>
</html>
